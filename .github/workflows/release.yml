name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system deps
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            curl \
            wget \
            file \
            patchelf \
            libssl-dev \
            rpm \
            flatpak \
            flatpak-builder \
            elfutils \
            xdg-utils \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri Linux bundles (unsigned)
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' '{"bundle":{"createUpdaterArtifacts":false}}' > "$RUNNER_TEMP/tauri-linux-nosign.json"
          pnpm tauri build --bundles appimage,deb,rpm --config "$RUNNER_TEMP/tauri-linux-nosign.json"

      - name: Build Flatpak Artifact
        shell: bash
        run: |
          set -euxo pipefail
          scripts/build-flatpak-artifact.sh

      - name: Prepare Linux Assets
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          VERSION="${GITHUB_REF_NAME}"
          ARCH="x86_64"

          APPIMAGE=$(find src-tauri/target/release/bundle -name "*.AppImage" | head -1 || true)
          if [ -z "$APPIMAGE" ]; then
            echo "No AppImage found under target/release/bundle" >&2
            exit 1
          fi
          cp "$APPIMAGE" "release-assets/CC-Switch-${VERSION}-Linux-${ARCH}.AppImage"

          DEB=$(find src-tauri/target/release/bundle -name "*.deb" | head -1 || true)
          if [ -z "$DEB" ]; then
            echo "No .deb found under target/release/bundle" >&2
            exit 1
          fi
          cp "$DEB" "release-assets/CC-Switch-${VERSION}-Linux-${ARCH}.deb"

          RPM=$(find src-tauri/target/release/bundle -name "*.rpm" | head -1 || true)
          if [ -z "$RPM" ]; then
            echo "No .rpm found under target/release/bundle" >&2
            exit 1
          fi
          cp "$RPM" "release-assets/CC-Switch-${VERSION}-Linux-${ARCH}.rpm"

          FLATPAK="dist-flatpak/CC-Switch-Linux.flatpak"
          if [ ! -f "$FLATPAK" ]; then
            echo "No Flatpak found at $FLATPAK" >&2
            exit 1
          fi
          cp "$FLATPAK" "release-assets/CC-Switch-${VERSION}-Linux-${ARCH}.flatpak"

      - name: List prepared assets
        shell: bash
        run: ls -la release-assets

      - name: Upload release artifacts to workflow
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-Linux-x86_64
          path: release-assets/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: release
    permissions:
      contents: write
    steps:
      - name: Download built release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: List downloaded release artifacts
        shell: bash
        run: |
          set -euo pipefail
          ls -la release-assets

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: CC Switch ${{ github.ref_name }}
          prerelease: false
          body: |
            ## CC Switch ${{ github.ref_name }}

            Linux x86_64 packages:
            - `CC-Switch-${{ github.ref_name }}-Linux-x86_64.AppImage`
            - `CC-Switch-${{ github.ref_name }}-Linux-x86_64.deb`
            - `CC-Switch-${{ github.ref_name }}-Linux-x86_64.rpm`
            - `CC-Switch-${{ github.ref_name }}-Linux-x86_64.flatpak`
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
