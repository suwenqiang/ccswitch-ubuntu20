name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Flatpak Artifact
        shell: bash
        run: |
          set -euxo pipefail
          scripts/build-flatpak-artifact.sh

      - name: Prepare Flatpak Asset
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          VERSION="${GITHUB_REF_NAME}"
          FLATPAK="dist-flatpak/CC-Switch-Linux.flatpak"
          if [ ! -f "$FLATPAK" ]; then
            echo "No Flatpak found at $FLATPAK" >&2
            exit 1
          fi
          cp "$FLATPAK" "release-assets/CC-Switch-${VERSION}-Linux-x86_64.flatpak"
          ls -la release-assets

      - name: Upload release artifacts to workflow
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-Linux-x86_64
          path: release-assets/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: release
    permissions:
      contents: write
    steps:
      - name: Download built release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: List downloaded release artifacts
        shell: bash
        run: |
          set -euo pipefail
          ls -la release-assets

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: CC Switch ${{ github.ref_name }}
          prerelease: false
          body: |
            ## CC Switch ${{ github.ref_name }}

            Linux x86_64 package:
            - `CC-Switch-${{ github.ref_name }}-Linux-x86_64.flatpak`
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
